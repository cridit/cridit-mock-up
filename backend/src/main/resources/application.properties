quarkus.http.root-path=/
quarkus.http.port=8001
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:3001,http://localhost:8081
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Accept,Authorization,Content-Type,Origin,X-Requested-With
quarkus.http.cors.access-control-max-age=24H

quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/metrics

quarkus.otel.exporter.otlp.endpoint=http://otel-collector:4317
quarkus.otel.logs.enabled=true

cridit.eventlog.path=target/cridit-events.jsonl

cridit.benchmark.hf.json-url=https://huggingface.co/api/datasets/open-llm-leaderboard/results
cridit.benchmark.model-id=qwen3-8b
cridit.benchmark.benchmark=mmlu
cridit.benchmark.metric=overall
cridit.benchmark.uncertainty=0.2
cridit.benchmark.weight=0.8

cridit.baseline.path=src/main/resources/baseline.json
cridit.tasks.path=src/main/resources/tasks.json
cridit.ollama.url=http://localhost:11434/api/generate
cridit.calibration.history.path=target/cridit-calibration-history.jsonl

quarkus.jvm-args=--add-opens java.base/java.lang=ALL-UNNAMED
quarkus.test.arg-line=--add-opens java.base/java.lang=ALL-UNNAMED

openai.api.key=${OPENAI_API_KEY:}
